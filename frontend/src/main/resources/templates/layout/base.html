<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<!-- FRAGMENTO: HEAD -->
<head th:fragment="head(pageTitle)">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${pageTitle} + ' — Gestor de Pendientes'">Gestor de Pendientes</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>

<!-- FRAGMENTO: SIDEBAR -->
<nav th:fragment="sidebar" id="sidebar" class="sidebar d-flex flex-column">
  <div class="sidebar-brand">
    <i class="bi bi-check2-circle me-2"></i>Gestor Pendientes
  </div>
  <ul class="sidebar-nav flex-grow-1">
    <li>
      <a th:href="@{/dashboard}" class="sidebar-link"
         th:classappend="${#httpServletRequest.requestURI == '/dashboard' or #httpServletRequest.requestURI == '/'} ? ' active' : ''">
        <i class="bi bi-grid-1x2-fill me-2"></i>Dashboard
      </a>
    </li>
    <li>
      <a th:href="@{/tareas}" class="sidebar-link"
         th:classappend="${#httpServletRequest.requestURI.startsWith('/tareas') and !#httpServletRequest.requestURI.contains('kanban')} ? ' active' : ''">
        <i class="bi bi-list-task me-2"></i>Mis Tareas
      </a>
    </li>
    <li>
      <a th:href="@{/tareas/kanban}" class="sidebar-link"
         th:classappend="${#httpServletRequest.requestURI.contains('kanban')} ? ' active' : ''">
        <i class="bi bi-kanban me-2"></i>Tablero Kanban
      </a>
    </li>
    <li class="sidebar-divider">Acciones</li>
    <li>
      <a th:href="@{/tareas/nueva}" class="sidebar-link">
        <i class="bi bi-plus-circle me-2"></i>Nueva Tarea
      </a>
    </li>
  </ul>
  <div class="sidebar-footer">
    <span class="text-muted small d-block mb-1">
      <i class="bi bi-person-circle me-1"></i>ITM — Prog. Software
    </span>
  </div>
</nav>

<!-- FRAGMENTO: ALERTS -->
<div th:fragment="alerts">
  <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
    <i class="bi bi-check-circle me-2"></i>
    <span th:text="${success}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
    <i class="bi bi-exclamation-circle me-2"></i>
    <span th:text="${error}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
</div>

<!-- FRAGMENTO: SCRIPTS BASE -->
<div th:fragment="scripts">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script th:src="@{/js/app.js}"></script>
</div>

</html>
