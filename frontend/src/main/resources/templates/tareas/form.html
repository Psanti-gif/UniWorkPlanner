<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head(${pageTitle})}">
  <title>Formulario Tarea</title>
</head>
<body>
<div class="wrapper d-flex">

  <div th:replace="~{layout/base :: sidebar}"></div>

  <main class="main-content flex-grow-1">
    <nav class="navbar navbar-light bg-white border-bottom px-3 d-lg-none">
      <button class="btn btn-link p-0" id="sidebarToggle">
        <i class="bi bi-list fs-4 text-dark"></i>
      </button>
      <span class="navbar-brand mb-0 fw-bold" th:text="${pageTitle}">Tarea</span>
    </nav>

    <div class="container-fluid px-4 pt-3">
      <div th:replace="~{layout/base :: alerts}"></div>

      <!-- Breadcrumb -->
      <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb small">
          <li class="breadcrumb-item"><a th:href="@{/tareas}">Tareas</a></li>
          <li class="breadcrumb-item active" th:text="${pageTitle}">Nueva Tarea</li>
        </ol>
      </nav>

      <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
          <div class="card">
            <div class="card-header bg-white py-3">
              <h5 class="mb-0 fw-semibold">
                <i th:class="${isNueva} ? 'bi bi-plus-circle me-2 text-primary' : 'bi bi-pencil me-2 text-primary'"></i>
                <span th:text="${pageTitle}">Tarea</span>
              </h5>
            </div>
            <div class="card-body">
              <form th:action="${isNueva} ? @{/tareas} : @{/tareas/{id}(id=${tarea.idTarea})}"
                    th:object="${tarea}" method="post" novalidate>

                <!-- Título -->
                <div class="mb-3">
                  <label class="form-label fw-medium">Título <span class="text-danger">*</span></label>
                  <input type="text" th:field="*{titulo}" class="form-control"
                         placeholder="Título de la tarea" required maxlength="255"/>
                  <div class="invalid-feedback">El título es obligatorio.</div>
                </div>

                <!-- Descripción -->
                <div class="mb-3">
                  <label class="form-label fw-medium">Descripción</label>
                  <textarea th:field="*{descripcion}" class="form-control" rows="4"
                            placeholder="Descripción detallada de la tarea..."></textarea>
                </div>

                <div class="row g-3 mb-3">
                  <!-- Fecha de Vencimiento -->
                  <div class="col-12 col-md-6">
                    <label class="form-label fw-medium">Fecha de Vencimiento</label>
                    <input type="date" th:field="*{fechaVencimiento}" class="form-control"
                           th:value="${tarea.fechaVencimiento != null ? #dates.format(tarea.fechaVencimiento, 'yyyy-MM-dd') : ''}"/>
                  </div>

                  <!-- Categoría -->
                  <div class="col-12 col-md-6">
                    <label class="form-label fw-medium">Categoría</label>
                    <input type="text" th:field="*{categoria}" class="form-control"
                           placeholder="Ej: Universidad, Trabajo, Personal" maxlength="20"/>
                  </div>
                </div>

                <div class="row g-3 mb-4">
                  <!-- Prioridad -->
                  <div class="col-12 col-md-6">
                    <label class="form-label fw-medium">Prioridad <span class="text-danger">*</span></label>
                    <select th:field="*{prioridad}" class="form-select" required>
                      <option value="">Selecciona una prioridad</option>
                      <option value="ALTA">🔴 Alta</option>
                      <option value="MEDIA">🟡 Media</option>
                      <option value="BAJA">🟢 Baja</option>
                    </select>
                  </div>

                  <!-- Estado -->
                  <div class="col-12 col-md-6">
                    <label class="form-label fw-medium">Estado <span class="text-danger">*</span></label>
                    <select th:field="*{estado}" class="form-select" required>
                      <option value="">Selecciona un estado</option>
                      <option value="PENDIENTE">⏳ Pendiente</option>
                      <option value="EN_PROGRESO">🔵 En Progreso</option>
                      <option value="COMPLETADA">✅ Completada</option>
                      <option value="CANCELADA">❌ Cancelada</option>
                    </select>
                  </div>
                </div>

                <!-- Botones -->
                <div class="d-flex gap-2">
                  <button type="submit" class="btn btn-primary">
                    <i th:class="${isNueva} ? 'bi bi-plus-lg me-1' : 'bi bi-check-lg me-1'"></i>
                    <span th:text="${isNueva} ? 'Crear Tarea' : 'Guardar Cambios'">Guardar</span>
                  </button>
                  <a th:href="${isNueva} ? @{/tareas} : @{/tareas/{id}(id=${tarea.idTarea})}"
                     class="btn btn-outline-secondary">
                    <i class="bi bi-x-lg me-1"></i>Cancelar
                  </a>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<div th:replace="~{layout/base :: scripts}"></div>
<script>
  // Validación HTML5 de Bootstrap
  (function() {
    var forms = document.querySelectorAll('form[novalidate]');
    forms.forEach(function(form) {
      form.addEventListener('submit', function(e) {
        if (!form.checkValidity()) {
          e.preventDefault();
          e.stopPropagation();
        }
        form.classList.add('was-validated');
      });
    });
  })();
</script>
</body>
</html>
