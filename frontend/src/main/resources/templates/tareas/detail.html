<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head(${pageTitle})}">
  <title>Detalle Tarea</title>
</head>
<body>
<div class="wrapper d-flex">

  <div th:replace="~{layout/base :: sidebar}"></div>

  <main class="main-content flex-grow-1">
    <nav class="navbar navbar-light bg-white border-bottom px-3 d-lg-none">
      <button class="btn btn-link p-0" id="sidebarToggle">
        <i class="bi bi-list fs-4 text-dark"></i>
      </button>
      <span class="navbar-brand mb-0 fw-bold">Detalle</span>
    </nav>

    <div class="container-fluid px-4 pt-3">
      <div th:replace="~{layout/base :: alerts}"></div>

      <!-- Breadcrumb -->
      <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb small">
          <li class="breadcrumb-item"><a th:href="@{/tareas}">Tareas</a></li>
          <li class="breadcrumb-item active" th:text="${tarea.titulo}">Tarea</li>
        </ol>
      </nav>

      <div class="row">
        <div class="col-12 col-lg-8">
          <div class="card">
            <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
              <h5 class="mb-0 fw-semibold" th:text="${tarea.titulo}">Título</h5>
              <div class="d-flex gap-2">
                <a th:href="@{/tareas/{id}/editar(id=${tarea.idTarea})}" class="btn btn-sm btn-outline-primary">
                  <i class="bi bi-pencil me-1"></i>Editar
                </a>
                <form th:action="@{/tareas/{id}/eliminar(id=${tarea.idTarea})}" method="post"
                      id="form-delete" class="d-inline">
                  <button type="button" class="btn btn-sm btn-outline-danger"
                          data-confirm="¿Eliminar esta tarea permanentemente?"
                          data-form="form-delete">
                    <i class="bi bi-trash me-1"></i>Eliminar
                  </button>
                </form>
              </div>
            </div>
            <div class="card-body">

              <!-- Badges de estado y prioridad -->
              <div class="d-flex flex-wrap gap-2 mb-4">
                <span th:if="${tarea.prioridad}"
                      th:class="'badge fs-6 ' + (${tarea.prioridad} == 'ALTA' ? 'bg-danger' :
                                                  (${tarea.prioridad} == 'MEDIA' ? 'bg-warning text-dark' : 'bg-success'))"
                      th:text="'Prioridad: ' + ${tarea.prioridad}"></span>
                <span th:if="${tarea.estado}"
                      th:class="'badge fs-6 badge-estado-' + ${tarea.estado.toLowerCase()}"
                      th:text="'Estado: ' + ${tarea.estado}"></span>
                <span th:if="${tarea.categoria}"
                      class="badge fs-6 bg-light text-dark border"
                      th:text="${tarea.categoria}"></span>
              </div>

              <!-- Descripción -->
              <div class="mb-4">
                <h6 class="text-muted text-uppercase small fw-semibold mb-2">Descripción</h6>
                <p th:text="${tarea.descripcion ?: 'Sin descripción.'}" class="mb-0"></p>
              </div>

              <!-- Fechas -->
              <div class="row g-3">
                <div class="col-6">
                  <h6 class="text-muted text-uppercase small fw-semibold mb-1">Creada</h6>
                  <p class="mb-0 fw-medium"
                     th:text="${tarea.fechaCreacion != null ? #dates.format(tarea.fechaCreacion, 'dd/MM/yyyy HH:mm') : '—'}"></p>
                </div>
                <div class="col-6">
                  <h6 class="text-muted text-uppercase small fw-semibold mb-1">Vencimiento</h6>
                  <p th:if="${tarea.fechaVencimiento != null}"
                     th:class="'mb-0 fw-medium ' + (${#dates.createToday().after(tarea.fechaVencimiento) and tarea.estado != 'COMPLETADA'} ? 'fecha-vencida' : '')"
                     th:text="${#dates.format(tarea.fechaVencimiento, 'dd/MM/yyyy')}"></p>
                  <p th:unless="${tarea.fechaVencimiento != null}" class="mb-0 text-muted">—</p>
                </div>
              </div>

            </div>
          </div>
        </div>

        <!-- Panel lateral: cambio rápido de estado -->
        <div class="col-12 col-lg-4 mt-3 mt-lg-0">
          <div class="card">
            <div class="card-header bg-white py-3">
              <h6 class="mb-0 fw-semibold"><i class="bi bi-arrow-repeat me-2"></i>Cambiar Estado</h6>
            </div>
            <div class="card-body">
              <div class="d-grid gap-2">
                <form th:each="est : ${ {'PENDIENTE','EN_PROGRESO','COMPLETADA','CANCELADA'} }"
                      th:action="@{/tareas/{id}/estado(id=${tarea.idTarea})}" method="post">
                  <input type="hidden" name="estado" th:value="${est}"/>
                  <button type="submit" class="btn btn-sm w-100"
                          th:classappend="${tarea.estado == est} ? ' btn-secondary' : ' btn-outline-secondary'"
                          th:text="${est}">Estado</button>
                </form>
              </div>
            </div>
          </div>
          <div class="mt-2">
            <a th:href="@{/tareas}" class="btn btn-link btn-sm text-muted">
              <i class="bi bi-arrow-left me-1"></i>Volver a la lista
            </a>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<div th:replace="~{layout/base :: scripts}"></div>
</body>
</html>
