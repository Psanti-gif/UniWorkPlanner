<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head(${pageTitle})}">
  <title>Tablero Kanban</title>
</head>
<body>
<div class="wrapper d-flex">

  <div th:replace="~{layout/base :: sidebar}"></div>

  <main class="main-content flex-grow-1">
    <nav class="navbar navbar-light bg-white border-bottom px-3 d-lg-none">
      <button class="btn btn-link p-0" id="sidebarToggle">
        <i class="bi bi-list fs-4 text-dark"></i>
      </button>
      <span class="navbar-brand mb-0 fw-bold">Tablero Kanban</span>
    </nav>

    <div class="container-fluid px-4 pt-3">
      <div th:replace="~{layout/base :: alerts}"></div>

      <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">Tablero Kanban</h4>
        <a th:href="@{/tareas/nueva}" class="btn btn-primary btn-sm">
          <i class="bi bi-plus-lg me-1"></i>Nueva Tarea
        </a>
      </div>

      <div id="toast-status" class="position-fixed top-0 end-0 p-3" style="z-index:9999;"></div>

      <!-- Columnas Kanban -->
      <div class="kanban-board">

        <!-- PENDIENTE -->
        <div class="kanban-column" data-estado="PENDIENTE"
             ondragover="event.preventDefault()" ondrop="drop(event)">
          <div class="kanban-column-header text-warning">
            <i class="bi bi-hourglass-split me-1"></i>Pendiente
            <span class="badge bg-warning text-dark ms-1 fw-normal"
                  th:text="${#lists.size(tareas.?[estado == 'PENDIENTE'])}">0</span>
          </div>
          <div th:each="t : ${tareas}" th:if="${t.estado == 'PENDIENTE'}">
            <div class="kanban-card" draggable="true"
                 th:attr="data-id=${t.idTarea}, data-estado='PENDIENTE'"
                 ondragstart="dragStart(event)"
                 th:classappend="'border-left-warning'">
              <div class="fw-medium small text-truncate mb-1" th:text="${t.titulo}">Tarea</div>
              <div class="d-flex justify-content-between align-items-center">
                <span th:if="${t.prioridad}"
                      th:class="'badge ' + (${t.prioridad} == 'ALTA' ? 'bg-danger' :
                                            (${t.prioridad} == 'MEDIA' ? 'bg-warning text-dark' : 'bg-success'))"
                      th:text="${t.prioridad}" style="font-size:0.65rem;"></span>
                <small th:if="${t.fechaVencimiento != null}" class="text-muted"
                       th:text="${#dates.format(t.fechaVencimiento, 'dd/MM')}"></small>
              </div>
              <a th:href="@{/tareas/{id}(id=${t.idTarea})}"
                 class="stretched-link" style="z-index:0;"></a>
            </div>
          </div>
        </div>

        <!-- EN_PROGRESO -->
        <div class="kanban-column" data-estado="EN_PROGRESO"
             ondragover="event.preventDefault()" ondrop="drop(event)">
          <div class="kanban-column-header text-primary">
            <i class="bi bi-arrow-clockwise me-1"></i>En Progreso
            <span class="badge bg-primary ms-1 fw-normal"
                  th:text="${#lists.size(tareas.?[estado == 'EN_PROGRESO'])}">0</span>
          </div>
          <div th:each="t : ${tareas}" th:if="${t.estado == 'EN_PROGRESO'}">
            <div class="kanban-card" draggable="true"
                 th:attr="data-id=${t.idTarea}, data-estado='EN_PROGRESO'"
                 ondragstart="dragStart(event)">
              <div class="fw-medium small text-truncate mb-1" th:text="${t.titulo}">Tarea</div>
              <div class="d-flex justify-content-between align-items-center">
                <span th:if="${t.prioridad}"
                      th:class="'badge ' + (${t.prioridad} == 'ALTA' ? 'bg-danger' :
                                            (${t.prioridad} == 'MEDIA' ? 'bg-warning text-dark' : 'bg-success'))"
                      th:text="${t.prioridad}" style="font-size:0.65rem;"></span>
                <small th:if="${t.fechaVencimiento != null}" class="text-muted"
                       th:text="${#dates.format(t.fechaVencimiento, 'dd/MM')}"></small>
              </div>
              <a th:href="@{/tareas/{id}(id=${t.idTarea})}"
                 class="stretched-link" style="z-index:0;"></a>
            </div>
          </div>
        </div>

        <!-- COMPLETADA -->
        <div class="kanban-column" data-estado="COMPLETADA"
             ondragover="event.preventDefault()" ondrop="drop(event)">
          <div class="kanban-column-header text-success">
            <i class="bi bi-check-circle me-1"></i>Completada
            <span class="badge bg-success ms-1 fw-normal"
                  th:text="${#lists.size(tareas.?[estado == 'COMPLETADA'])}">0</span>
          </div>
          <div th:each="t : ${tareas}" th:if="${t.estado == 'COMPLETADA'}">
            <div class="kanban-card" draggable="true"
                 th:attr="data-id=${t.idTarea}, data-estado='COMPLETADA'"
                 ondragstart="dragStart(event)">
              <div class="fw-medium small text-truncate mb-1" th:text="${t.titulo}">Tarea</div>
              <div class="d-flex justify-content-between align-items-center">
                <span th:if="${t.prioridad}"
                      th:class="'badge ' + (${t.prioridad} == 'ALTA' ? 'bg-danger' :
                                            (${t.prioridad} == 'MEDIA' ? 'bg-warning text-dark' : 'bg-success'))"
                      th:text="${t.prioridad}" style="font-size:0.65rem;"></span>
                <small th:if="${t.fechaVencimiento != null}" class="text-muted"
                       th:text="${#dates.format(t.fechaVencimiento, 'dd/MM')}"></small>
              </div>
              <a th:href="@{/tareas/{id}(id=${t.idTarea})}"
                 class="stretched-link" style="z-index:0;"></a>
            </div>
          </div>
        </div>

        <!-- CANCELADA -->
        <div class="kanban-column" data-estado="CANCELADA"
             ondragover="event.preventDefault()" ondrop="drop(event)">
          <div class="kanban-column-header text-danger">
            <i class="bi bi-x-circle me-1"></i>Cancelada
            <span class="badge bg-danger ms-1 fw-normal"
                  th:text="${#lists.size(tareas.?[estado == 'CANCELADA'])}">0</span>
          </div>
          <div th:each="t : ${tareas}" th:if="${t.estado == 'CANCELADA'}">
            <div class="kanban-card" draggable="true"
                 th:attr="data-id=${t.idTarea}, data-estado='CANCELADA'"
                 ondragstart="dragStart(event)">
              <div class="fw-medium small text-truncate mb-1" th:text="${t.titulo}">Tarea</div>
              <div class="d-flex justify-content-between align-items-center">
                <span th:if="${t.prioridad}"
                      th:class="'badge ' + (${t.prioridad} == 'ALTA' ? 'bg-danger' :
                                            (${t.prioridad} == 'MEDIA' ? 'bg-warning text-dark' : 'bg-success'))"
                      th:text="${t.prioridad}" style="font-size:0.65rem;"></span>
                <small th:if="${t.fechaVencimiento != null}" class="text-muted"
                       th:text="${#dates.format(t.fechaVencimiento, 'dd/MM')}"></small>
              </div>
              <a th:href="@{/tareas/{id}(id=${t.idTarea})}"
                 class="stretched-link" style="z-index:0;"></a>
            </div>
          </div>
        </div>

      </div>
    </div>
  </main>
</div>

<div th:replace="~{layout/base :: scripts}"></div>
<script>
  let draggedId = null;

  function dragStart(e) {
    draggedId = e.currentTarget.dataset.id;
    e.currentTarget.style.opacity = '0.5';
    e.dataTransfer.effectAllowed = 'move';
  }

  document.querySelectorAll('.kanban-card').forEach(card => {
    card.addEventListener('dragend', () => { card.style.opacity = '1'; });
  });

  async function drop(e) {
    e.preventDefault();
    const column = e.currentTarget;
    const nuevoEstado = column.dataset.estado;
    if (!draggedId) return;

    try {
      const resp = await fetch(`/tareas/${draggedId}/estado?estado=${nuevoEstado}`, {
        method: 'POST',
        headers: { 'X-Requested-With': 'XMLHttpRequest' }
      });
      if (resp.ok) {
        showKanbanToast('Estado actualizado a ' + nuevoEstado, 'success');
        setTimeout(() => location.reload(), 800);
      } else {
        showKanbanToast('Error al actualizar estado', 'danger');
      }
    } catch (err) {
      showKanbanToast('Error de conexión', 'danger');
    }
    draggedId = null;
  }

  function showKanbanToast(msg, type) {
    const c = document.getElementById('toast-status');
    const el = document.createElement('div');
    el.className = `toast align-items-center text-bg-${type} border-0 show`;
    el.innerHTML = `<div class="d-flex"><div class="toast-body">${msg}</div></div>`;
    c.appendChild(el);
    setTimeout(() => el.remove(), 2500);
  }
</script>
</body>
</html>
