<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head(${pageTitle})}">
  <title>Dashboard</title>
</head>
<body>
<div class="wrapper d-flex">

  <div th:replace="~{layout/base :: sidebar}"></div>

  <main class="main-content flex-grow-1">
    <!-- Navbar móvil -->
    <nav class="navbar navbar-light bg-white border-bottom px-3 d-lg-none">
      <button class="btn btn-link p-0" id="sidebarToggle">
        <i class="bi bi-list fs-4 text-dark"></i>
      </button>
      <span class="navbar-brand mb-0 fw-bold">Gestor de Pendientes</span>
    </nav>

    <div class="container-fluid px-4 pt-3">
      <div th:replace="~{layout/base :: alerts}"></div>

      <!-- Header -->
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h4 class="fw-bold mb-1">Dashboard</h4>
          <p class="text-muted mb-0 small">Resumen de tus tareas y pendientes</p>
        </div>
        <a th:href="@{/tareas/nueva}" class="btn btn-primary">
          <i class="bi bi-plus-lg me-1"></i>Nueva Tarea
        </a>
      </div>

      <!-- Stats Cards -->
      <div class="row g-3 mb-4">
        <div class="col-6 col-lg-3">
          <div class="stat-card">
            <div class="d-flex justify-content-between align-items-start">
              <div>
                <p class="text-muted small mb-1">Total Tareas</p>
                <h3 class="fw-bold mb-0" th:text="${totalTareas}">0</h3>
              </div>
              <div class="stat-icon bg-primary bg-opacity-10 text-primary">
                <i class="bi bi-list-check"></i>
              </div>
            </div>
          </div>
        </div>
        <div class="col-6 col-lg-3">
          <div class="stat-card">
            <div class="d-flex justify-content-between align-items-start">
              <div>
                <p class="text-muted small mb-1">Completadas</p>
                <h3 class="fw-bold mb-0 text-success" th:text="${completadas}">0</h3>
              </div>
              <div class="stat-icon bg-success bg-opacity-10 text-success">
                <i class="bi bi-check-circle"></i>
              </div>
            </div>
          </div>
        </div>
        <div class="col-6 col-lg-3">
          <div class="stat-card">
            <div class="d-flex justify-content-between align-items-start">
              <div>
                <p class="text-muted small mb-1">En Progreso</p>
                <h3 class="fw-bold mb-0 text-primary" th:text="${porEstado['EN_PROGRESO'] ?: 0}">0</h3>
              </div>
              <div class="stat-icon bg-info bg-opacity-10 text-info">
                <i class="bi bi-arrow-clockwise"></i>
              </div>
            </div>
          </div>
        </div>
        <div class="col-6 col-lg-3">
          <div class="stat-card">
            <div class="d-flex justify-content-between align-items-start">
              <div>
                <p class="text-muted small mb-1">Pendientes</p>
                <h3 class="fw-bold mb-0 text-warning" th:text="${porEstado['PENDIENTE'] ?: 0}">0</h3>
              </div>
              <div class="stat-icon bg-warning bg-opacity-10 text-warning">
                <i class="bi bi-hourglass-split"></i>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="row g-3">
        <!-- Próximas a vencer -->
        <div class="col-12 col-lg-6">
          <div class="card h-100">
            <div class="card-header bg-white border-bottom-0 py-3">
              <h6 class="fw-semibold mb-0">
                <i class="bi bi-alarm text-danger me-2"></i>Próximas a Vencer (3 días)
              </h6>
            </div>
            <div class="card-body pt-0">
              <div th:if="${#lists.isEmpty(proximasVencer)}" class="text-center py-3 text-muted">
                <i class="bi bi-check2-all fs-2 d-block mb-2"></i>
                Sin tareas urgentes
              </div>
              <div th:each="t : ${proximasVencer}" class="d-flex align-items-center py-2 border-bottom">
                <div class="flex-grow-1">
                  <p class="mb-0 fw-medium text-truncate" th:text="${t.titulo}">Tarea</p>
                  <small class="text-danger" th:if="${t.fechaVencimiento != null}">
                    <i class="bi bi-calendar-x me-1"></i>
                    <span th:text="${#dates.format(t.fechaVencimiento, 'dd/MM/yyyy')}"></span>
                  </small>
                </div>
                <a th:href="@{/tareas/{id}(id=${t.idTarea})}" class="btn btn-sm btn-outline-primary ms-2">
                  <i class="bi bi-eye"></i>
                </a>
              </div>
            </div>
          </div>
        </div>

        <!-- Estado tareas chart / list -->
        <div class="col-12 col-lg-6">
          <div class="card h-100">
            <div class="card-header bg-white border-bottom-0 py-3">
              <h6 class="fw-semibold mb-0">
                <i class="bi bi-bar-chart text-primary me-2"></i>Estado de Tareas
              </h6>
            </div>
            <div class="card-body pt-0">
              <div th:each="entry : ${porEstado}" class="mb-3">
                <div class="d-flex justify-content-between mb-1">
                  <small class="fw-medium" th:text="${entry.key}">Estado</small>
                  <small class="text-muted" th:text="${entry.value}">0</small>
                </div>
                <div class="progress" style="height: 8px;">
                  <div class="progress-bar"
                       th:style="'width: ' + (${totalTareas} > 0 ? (${entry.value} * 100 / ${totalTareas}) : 0) + '%'"
                       th:classappend="${entry.key == 'COMPLETADA'} ? ' bg-success' :
                                       (${entry.key == 'EN_PROGRESO'} ? ' bg-primary' :
                                       (${entry.key == 'CANCELADA'} ? ' bg-danger' : ' bg-warning'))">
                  </div>
                </div>
              </div>
              <div th:if="${#maps.isEmpty(porEstado)}" class="text-center py-3 text-muted">
                <i class="bi bi-inbox fs-2 d-block mb-2"></i>
                No hay tareas aún
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<div th:replace="~{layout/base :: scripts}"></div>
</body>
</html>
